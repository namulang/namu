name: CI for main

on:
  push:
    branches: [ test-workflow ]
  pull_request:
    branches: [ test-workflow ]

jobs:
  checking-code-format:
    name: check code format with clang-format
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        path:
          - check: 'mod'
            exclude: '(leafLowparser|leafLowscanner|lowparser|lowscanner)'
    steps:
    - name: checkout repository codes
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install clang-format-18
      run: |
        wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
        echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-18 main" | sudo tee /etc/apt/sources.list.d/llvm.list
        sudo apt update
        sudo apt install -y clang-format-18

    - name: Determine base commit
      id: get-base
      run: |
        if git rev-parse HEAD^ >/dev/null 2>&1; then
          echo "BASE=HEAD^" >> $GITHUB_OUTPUT
        else
          echo "BASE=4b825dc642cb6eb9a060e54bf8d69288fbee4904" >> $GITHUB_OUTPUT
        fi  # 빈 트리 해시 대체[7]

    - name: Run clang-format check
      id: format-check
      run: |
        OUTPUT=$(git clang-format-18 --diff --binary clang-format-18 ${{ steps.get-base.outputs.BASE }} \
          --extensions c,cpp,h,hpp,inl)
        echo "output<<EOF" >> $GITHUB_OUTPUT
        echo "$OUTPUT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
        # 실제 diff 존재 여부 검사
        if [ -n "$OUTPUT" ] && [[ "$OUTPUT" != "no modified files to format"* ]] && [[ "$OUTPUT" != "clang-format did not modify any files"* ]]; then
          echo "result=failure" >> $GITHUB_OUTPUT
        else
          echo "result=success" >> $GITHUB_OUTPUT
        fi

    - name: Report formatting issues
      if: steps.format-check.outputs.result == 'failure'
      run: |
        echo "❌ clang-format 검사 실패:"
        echo "${{ steps.format-check.outputs.output }}"
        exit 1
