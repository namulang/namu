name: CI for main

on:
  push:
    branches: [ test-workflow ]
  pull_request:
    branches: [ test-workflow ]

jobs:
  checking-code-format:
    name: check code format with clang-format
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        path:
          - check: 'mod'
            exclude: '(leafLowparser|leafLowscanner|lowparser|lowscanner)'
    steps:
    - name: checkout repository codes
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install clang-format-18
      run: |
        wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
        echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-18 main" | sudo tee /etc/apt/sources.list.d/llvm.list
        sudo apt update
        sudo apt install -y clang-format-18

    - name: Determine base commit
      id: get-base
      run: |
        if git rev-parse HEAD^; then
          echo "BASE=HEAD^" >> $GITHUB_OUTPUT
        else
          echo "BASE=4b825dc642cb6eb9a060e54bf8d69288fbee4904" >> $GITHUB_OUTPUT
        fi

   - name: Run clang-format check
      id: format-check
      run: |
        # 실제 diff 생성 (오류 무시하지 않음)
        git clang-format-18 --diff --binary clang-format-18 ${{ steps.get-base.outputs.BASE }} \
          --extensions c,cpp,h,hpp,inl > clang-format.diff || true
        
        # diff 내용 분석
        if grep -q "diff --git" clang-format.diff; then
          echo "result=failure" >> $GITHUB_ENV
          exit 1  # 명시적 실패 처리
        else
          echo "result=success" >> $GITHUB_ENV
        fi

    - name: Report formatting issues
      if: env.result == 'failure'
      run: |
        echo "❌ clang-format 형식 오류:"
        cat clang-format.diff
        exit 1  # 최종 실패 상태 전달
